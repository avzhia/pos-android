name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1 ── Obtener el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2 ── Java 17 (requerido por AGP 8.x)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3 ── Eliminar Gradle del sistema para que no interfiera con el wrapper
      - name: Eliminar Gradle del sistema
        run: |
          sudo rm -f /usr/bin/gradle
          sudo rm -rf /usr/share/gradle*
          sudo rm -rf /opt/gradle*
          echo "Gradle del sistema eliminado"

      # 4 ── Cache de ~/.gradle para acelerar builds posteriores
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 5 ── Permisos al wrapper
      - name: Permisos gradlew
        run: chmod +x gradlew

      # 6 ── Verificar versión (para confirmar en logs)
      - name: Verificar versión de Gradle
        run: ./gradlew --version

      # 7 ── Compilar APK debug
      - name: Build APK debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 8 ── Subir APK como artefacto descargable
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: pos-naturista-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
