name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1 ── Obtener el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2 ── Java 17 (requerido por AGP 8.x)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3 ── Instalar Gradle 8.6 del sistema y generar el wrapper.jar
      - name: Instalar Gradle 8.6 y generar wrapper
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-8.6-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          GRADLE_BIN="/tmp/gradle-dist/gradle-8.6/bin/gradle"
          chmod +x "$GRADLE_BIN"
          # Generar gradle-wrapper.jar en el proyecto
          "$GRADLE_BIN" wrapper --gradle-version 8.6 --distribution-type bin
          echo "wrapper.jar generado:"
          ls -lh gradle/wrapper/

      # 4 ── Permisos al wrapper
      - name: Permisos gradlew
        run: chmod +x gradlew

      # 5 ── Cache de ~/.gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 6 ── Verificar versión de Gradle
      - name: Verificar versión de Gradle
        run: ./gradlew --version

      # 7 ── Compilar APK debug
      - name: Build APK debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 8 ── Subir APK como artefacto descargable
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: pos-naturista-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
