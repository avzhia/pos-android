name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1 ── Obtener el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2 ── Java 17 (requerido por AGP 8.x)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3 ── Forzar uso del Gradle Wrapper exacto del proyecto
      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      # 4 ── Permisos al wrapper (necesario en Linux)
      - name: Permisos gradlew
        run: chmod +x gradlew

      # 5 ── Compilar APK debug
      - name: Build APK debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 6 ── Subir APK como artefacto descargable
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: pos-naturista-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
